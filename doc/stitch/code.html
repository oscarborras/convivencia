<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login de Acceso IES Julio Verne</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Lexend"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Lexend', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">
<div class="w-full max-w-[480px] flex flex-col gap-6">
<!-- Logo and Branding -->
<div class="flex flex-col items-center gap-4 mb-2">
<div class="w-20 h-20 bg-primary/10 rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined !text-5xl">school</span>
</div>
<div class="text-center">
<h2 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-slate-100">IES Julio Verne</h2>
<p class="text-slate-500 dark:text-slate-400 font-medium">Gestión de Convivencia y Asistencia</p>
</div>
</div>
<!-- Main Login Card -->
<div class="bg-white dark:bg-slate-900 rounded-xl shadow-xl border border-primary/10 overflow-hidden">
<!-- Header Image Component -->
<div class="relative w-full h-32 bg-primary/5">
<div class="absolute inset-0 bg-cover bg-center opacity-80" data-alt="Modern library interior with natural lighting" style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuAbbyzD_9EIynfmaHpr8qhcwoqFnXukks1GT3gXkugfqqQofbfW-nyLGljjhKpcb_31-JkSlaKSUZbwAWjnb8Y_bGoDQ5A0JAlq_99jNcijenZZM1TcYI3tynR8398LFPxNNiTMz3C8xnHpgcSF5qsWJlMGzPYqhCBE7xCEkAXT_ZsDSZiojaAcvTfKcxENmfnxQhuhxen_s5YXjBauYtmPM1roUgEqs22f3vBAtotk8tA6ZGnmKzoXHVTJ1sQqWsBsswVIrKh8jQ");'>
</div>
<div class="absolute inset-0 bg-gradient-to-t from-white dark:from-slate-900 to-transparent"></div>
</div>
<div class="px-8 pb-8 pt-2">
<div class="text-center mb-8">
<h1 class="text-2xl font-bold text-slate-900 dark:text-white">Acceso al Sistema</h1>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Identifícate para continuar al panel</p>
</div>
<!-- Google Auth Button -->
<button class="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg h-12 px-5 text-slate-700 dark:text-slate-200 font-semibold hover:bg-slate-50 dark:hover:bg-slate-750 transition-colors mb-6 shadow-sm">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span>Iniciar sesión con Google</span>
</button>
<div class="relative mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-700"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-white dark:bg-slate-900 px-4 text-slate-500 dark:text-slate-400 font-medium">O acceso administrativo</span>
</div>
</div>
<!-- Admin Form -->
<form class="space-y-4" onsubmit="return false;">
<div>
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300 mb-1.5" for="email">Correo Electrónico</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 !text-xl">mail</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-background-light dark:bg-slate-800 border-none rounded-lg focus:ring-2 focus:ring-primary text-slate-900 dark:text-white transition-all" id="email" placeholder="ejemplo@iesjulioverne.es" type="email"/>
</div>
</div>
<div>
<div class="flex justify-between items-center mb-1.5">
<label class="block text-sm font-semibold text-slate-700 dark:text-slate-300" for="password">Contraseña</label>
<a class="text-xs font-medium text-primary hover:underline" href="#">¿Olvidaste tu contraseña?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 !text-xl">lock</span>
<input class="w-full pl-10 pr-4 py-2.5 bg-background-light dark:bg-slate-800 border-none rounded-lg focus:ring-2 focus:ring-primary text-slate-900 dark:text-white transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<button class="w-full bg-primary text-white font-bold py-3 rounded-lg hover:bg-primary/90 transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2 mt-2" type="submit">
<span>Entrar al Panel</span>
<span class="material-symbols-outlined !text-lg">login</span>
</button>
</form>
</div>
</div>
<!-- Footer Links -->
<div class="flex flex-col items-center gap-4 text-sm">
<div class="flex gap-6 text-slate-500 dark:text-slate-400">
<a class="hover:text-primary transition-colors" href="#">Términos de uso</a>
<a class="hover:text-primary transition-colors" href="#">Privacidad</a>
<a class="hover:text-primary transition-colors" href="#">Soporte Técnico</a>
</div>
<p class="text-slate-400 dark:text-slate-500">© 2024 IES Julio Verne - Todos los derechos reservados</p>
</div>
</div>
</body></html>
